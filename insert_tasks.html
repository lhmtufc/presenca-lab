<!DOCTYPE html>
<html>
<body>
    <h1>Atualizando Banco e Inserindo Dados...</h1>
    <div id="log"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://vnodbsefjwvapvtdzgdl.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZub2Ric2Vmand2YXB2dGR6Z2RsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNzI5NTMsImV4cCI6MjA4ODk0ODk1M30.M-7v57-obulKagTn-p5Pp6oKJWwcuu5FIvSLJ6andvs';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function run() {
            const log = document.getElementById('log');
            
            try {
                log.innerHTML += "> Buscando ID de um projeto padrão...<br>";
                const { data: projs } = await supabase.from('projects').select('id').limit(1);
                // Oops, table name check - in previous steps it was 'projetos'
                const { data: projs2 } = await supabase.from('projetos').select('id').limit(1);
                const projectId = projs2?.[0]?.id;

                if (!projectId) {
                   log.innerHTML += "<b>ERRO:</b> Nenhum projeto encontrado para associar as tarefas.<br>";
                   return;
                }

                log.innerHTML += "> Note: Para adicionar a coluna 'prazo' e mudar restrições de status, você deve rodar o SQL abaixo no Painel do Supabase (SQL Editor).<br>";
                log.innerHTML += "<pre style='background:#eee;padding:10px;'>ALTER TABLE tarefas ADD COLUMN IF NOT EXISTS prazo DATE;<br>-- Se houver restrição de status, rode: <br>-- ALTER TABLE tarefas DROP CONSTRAINT IF EXISTS tarefas_status_check;</pre>";

                log.innerHTML += "> Inserindo tarefas via API...<br>";
                
                const tasksToInsert = [
                    { projeto_id: projectId, descricao: 'Fabricar as barras quadradas', responsaveis: ["Ryan", "Sauã", "Clara", "Lucas Duarte", "João Guilherme"], status: 'concluida', created_at: '2025-11-12' },
                    { projeto_id: projectId, descricao: 'Fabricar o suporte do dinamômetro', responsaveis: ["Ryan", "Lucas Duarte", "João Guilherme"], status: 'atrasado', created_at: '2025-12-08' },
                    { projeto_id: projectId, descricao: 'Suporte do motor', responsaveis: ["João Guilherme", "Sauã"], status: 'em andamento', created_at: new Date().toISOString() },
                    { projeto_id: projectId, descricao: 'Pintura da bancada', responsaveis: ["Lucas Duarte", "Ryan"], status: 'concluida', created_at: '2025-12-10' }
                ];

                const { error } = await supabase.from('tarefas').insert(tasksToInsert);
                
                if (error) log.innerHTML += `> ERRO na inserção: ${error.message}<br>`;
                else log.innerHTML += `> <b>Tarefas inseridas com sucesso!</b><br>`;

            } catch (e) {
                log.innerHTML += `> ERRO GERAL: ${e.message}<br>`;
            }
        }
        run();
    </script>
</body>
</html>
